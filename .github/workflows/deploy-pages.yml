name: Deploy to GitHub Pages

# Manual trigger by default so this never conflicts with a Vercel deploy.
# To auto-deploy on every push, uncomment the `push` block below and set
# Settings -> Pages -> Source to "GitHub Actions".
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Repo is served at https://<user>.github.io/<repo>/ — change if the repo is renamed.
          VITE_BASE: /portfolio/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
