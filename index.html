<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0d0c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f6f3" media="(prefers-color-scheme: light)" />

    <title>Jun Ming Chen — AI/ML Engineer</title>
    <meta
      name="description"
      content="Jun Ming Chen — AI/ML engineer building LLM-powered systems: RAG pipelines, multi-agent tools, and the data infrastructure behind them. Experience at Modular Asset Management, ST Engineering, Yokogawa, and Ai Palette."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jun Ming Chen — AI/ML Engineer" />
    <meta
      property="og:description"
      content="AI/ML engineer building LLM-powered systems — RAG, multi-agent tools, and the data infrastructure behind them — shipping fast with agentic coding."
    />
    <meta property="og:image" content="%BASE_URL%og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: Fraunces (display serif), Geist (body), JetBrains Mono (technical) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Apply theme before paint to avoid flash of incorrect theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
